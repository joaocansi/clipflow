name: Release

# Publica uma nova versão sempre que uma tag "v*" for enviada para o repositório.
# Ex.: git tag v1.0.0 && git push origin v1.0.0
# Também pode ser disparado manualmente pela aba Actions (workflow_dispatch).
on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Versão a publicar (sem o 'v'), ex.: 1.0.0"
        required: true

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Descobre a versão: usa a tag (sem o 'v') ou o input do dispatch manual.
      - name: Resolve version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            VERSION="${{ github.event.inputs.version }}"
          else
            VERSION="${GITHUB_REF_NAME#v}"
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=v$VERSION" >> "$GITHUB_OUTPUT"
          echo "Publicando versão $VERSION"

      # Mantém package.json, tauri.conf.json e Cargo.toml em sincronia com a tag,
      # para que os binários (.deb/.rpm/.AppImage) carreguem o número de versão correto.
      - name: Sync version files
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          # package.json
          npm pkg set version="$VERSION"
          # tauri.conf.json
          tmp=$(mktemp)
          jq --arg v "$VERSION" '.version = $v' src-tauri/tauri.conf.json > "$tmp" && mv "$tmp" src-tauri/tauri.conf.json
          # Cargo.toml (primeira ocorrência de version = "..." na seção [package])
          sed -i "0,/^version = \".*\"/s//version = \"$VERSION\"/" src-tauri/Cargo.toml
          echo "package.json -> $(jq -r .version package.json)"
          echo "tauri.conf.json -> $(jq -r .version src-tauri/tauri.conf.json)"
          grep -m1 '^version' src-tauri/Cargo.toml

      - name: Install Linux system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libxdo-dev \
            libssl-dev \
            patchelf \
            build-essential \
            curl \
            wget \
            file

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "src-tauri -> target"

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      # Builda o frontend + a app Tauri, gera .deb/.rpm/.AppImage e cria/atualiza
      # a GitHub Release com todos os artefatos anexados.
      - name: Build and release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ steps.version.outputs.tag }}
          releaseName: "ClipFlow ${{ steps.version.outputs.tag }}"
          releaseBody: "Veja os arquivos abaixo para baixar o instalador da sua plataforma (.deb, .rpm ou .AppImage)."
          releaseDraft: false
          prerelease: false
